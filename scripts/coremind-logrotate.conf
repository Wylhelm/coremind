# CoreMind logrotate config
# Installed at /etc/logrotate.d/coremind
# Rotates all /tmp/coremind-*.log files

/tmp/coremind-daemon.log
/tmp/coremind-bridge.log
/tmp/coremind-plugin-*.log {
    daily
    rotate 7
    maxsize 50M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su guillaume guillaume
}
