name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI — Lint, Specs, Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup (create venv + install deps)
        run: just setup

      - name: Lint (ruff + mypy)
        run: just lint

      - name: Validate specs
        run: just spec-validate

      - name: Check proto stubs are up to date
        run: just proto-gen-check

      - name: Run tests
        run: just test

      - name: Run release-gating scenarios
        run: just test-scenarios
