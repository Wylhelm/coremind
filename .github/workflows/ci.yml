name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase0-contracts:
    name: Phase 0 — Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup (create venv + install deps)
        run: just setup

      - name: Lint (ruff + mypy)
        run: just lint

      - name: Validate specs
        run: just spec-validate

      - name: Check proto stubs are up to date
        run: just proto-gen-check

      - name: Run tests (no tests yet in Phase 0; harness must work)
        run: |
          just test; exit_code=$?
          # exit code 5 = no tests collected; acceptable in Phase 0
          if [ $exit_code -ne 0 ] && [ $exit_code -ne 5 ]; then exit $exit_code; fi
